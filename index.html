<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Hoodie 工厂 - 原型版</title>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #game-container { width: 400px; border: 2px solid #444; padding: 20px; border-radius: 8px; background: #222; text-align: center; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; background: #333; padding: 10px; border-radius: 4px; font-weight: bold; }
        .scene { height: 150px; display: flex; align-items: center; justify-content: center; border: 1px dashed #666; margin-bottom: 20px; font-size: 1.2rem; transition: all 0.5s; }
        .btn { background: #444; color: white; border: none; padding: 10px 15px; cursor: pointer; margin: 5px; border-radius: 4px; }
        .btn:hover { background: #666; }
        .btn:disabled { background: #222; color: #555; cursor: not-allowed; }
        .factory-on { background: #4a332d; border-color: #ff5722; }
        #log { font-size: 0.8rem; color: #888; height: 60px; overflow-y: auto; text-align: left; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>

    <h2>👕 Hoodie 工厂 <small style="font-size: 0.8rem; opacity: 0.6;">v0.1</small></h2>

    <div id="game-container">
        <div class="status-bar">
            <div id="time-display">08:00</div>
            <div>💰 $<span id="money">0</span></div>
            <div>📦 <span id="hoodie">0</span></div>
        </div>

        <div id="scene-box" class="scene">姨妈的次卧</div>

        <div id="actions">
            <button class="btn" onclick="move('次卧')">回次卧</button>
            <button class="btn" onclick="move('街道')">去街上</button>
            <button class="btn" onclick="move('工厂')">进工厂</button>
            <hr style="border: 0.5px solid #333;">
            <button id="work-btn" class="btn" onclick="produce()" disabled>缝制卫衣 (18:00后可用)</button>
            <button id="scavenge-btn" class="btn" onclick="scavenge()">捡垃圾/接单</button>
        </div>

        <div id="log">姨妈：干干，起床啦，记得晚上再用生产线。</div>
    </div>

    <script>
        let gameState = {
            hour: 8,
            minute: 0,
            money: 0,
            hoodie: 0,
            location: '次卧',
            producedToday: 0
        };

        function updateUI() {
            // 时间显示
            const h = gameState.hour.toString().padStart(2, '0');
            const m = gameState.minute.toString().padStart(2, '0');
            document.getElementById('time-display').innerText = `${h}:${m}`;
            document.getElementById('money').innerText = gameState.money;
            document.getElementById('hoodie').innerText = gameState.hoodie;
            document.getElementById('scene-box').innerText = gameState.location;

            // 按钮逻辑：18:00 - 02:00 工厂可用
            const isWorkingHour = (gameState.hour >= 18 || gameState.hour < 2);
            const inFactory = gameState.location === '工厂';
            const workBtn = document.getElementById('work-btn');
            
            if (inFactory && isWorkingHour && gameState.producedToday < 8) {
                workBtn.disabled = false;
                document.getElementById('scene-box').classList.add('factory-on');
            } else {
                workBtn.disabled = true;
                document.getElementById('scene-box').classList.remove('factory-on');
            }

            // 强制睡眠检测
            if (gameState.hour === 2 && gameState.minute === 0 && gameState.location !== '次卧') {
                addLog("太晚了！你晕倒在路边被送回了次卧...");
                gameState.location = '次卧';
                gameState.money = Math.max(0, gameState.money - 5); // 罚款
                passTime(360); // 直接跳到早上 8 点
            }
        }

        function passTime(mins) {
            gameState.minute += mins;
            while (gameState.minute >= 60) {
                gameState.minute -= 60;
                gameState.hour += 1;
            }
            if (gameState.hour >= 24) {
                gameState.hour -= 24;
                gameState.producedToday = 0; // 新的一天重置产量
                addLog("新的一天开始了。");
            }
            updateUI();
        }

        function move(loc) {
            if (loc === '工厂' && !(gameState.hour >= 18 || gameState.hour < 2)) {
                addLog("工厂还没到使用时间呢。");
                return;
            }
            gameState.location = loc;
            addLog(`移动到了 ${loc}`);
            passTime(10);
        }

        function produce() {
            if (gameState.producedToday < 8) {
                gameState.hoodie += 1;
                gameState.producedToday += 1;
                addLog(`缝制了一件卫衣 (今日: ${gameState.producedToday}/8)`);
                passTime(45); // 缝一件要 45 分钟
            } else {
                addLog("今天的生产配额用完了。");
            }
        }

        function scavenge() {
            if (gameState.location !== '街道') {
                addLog("只有在街上才能捡垃圾或接单。");
                return;
            }
            let earn = Math.floor(Math.random() * 10);
            gameState.money += earn;
            addLog(`你在街上忙活了一阵，赚了 $${earn}`);
            passTime(60);
        }

        function addLog(msg) {
            const log = document.getElementById('log');
            log.innerHTML = `> ${msg}<br>${log.innerHTML}`;
        }

        // 模拟时间流逝（每 2 秒游戏内过 15 分钟）
        setInterval(() => passTime(5), 2000);

        updateUI();
    </script>
</body>
</html>
